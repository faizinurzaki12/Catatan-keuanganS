<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar - Catatan Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body {
        background: #f4f6f9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .auth-card {
        width: 100%;
        max-width: 380px;
        background: #fff;
        border-radius: 14px;
        padding: 32px 28px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      .auth-brand { font-weight: 700; font-size: 1.3rem; text-align: center; margin-bottom: 4px; }
      .auth-sub { text-align: center; color: #6c757d; font-size: 0.9rem; margin-bottom: 24px; }
      .btn-primary { width: 100%; }
      .switch-text { text-align: center; margin-top: 16px; font-size: 0.9rem; }
      .switch-text a { text-decoration: none; font-weight: 600; }
      .d-none { display: none; }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <div class="auth-brand">Catatan Keuangan</div>
      <div class="auth-sub">Buat akun baru</div>

      <div id="regError" class="alert alert-danger py-2 d-none" role="alert"></div>
      <div id="regSuccess" class="alert alert-success py-2 d-none" role="alert"></div>

      <form id="formRegister">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="regEmail" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="regPassword" required minlength="6" />
        </div>
        <div class="mb-3">
          <label class="form-label">Konfirmasi Password</label>
          <input type="password" class="form-control" id="regPasswordConfirm" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary">Daftar</button>
      </form>

      <div class="switch-text">
        Sudah punya akun?
        <a href="/">Masuk di sini</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-init.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
