<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar - Catatan Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { font-family: 'Poppins', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #6C63FF 0%, #4834d4 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .auth-wrapper {
        width: 100%;
        max-width: 900px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        overflow: hidden;
        display: flex;
        min-height: 560px;
      }

      .auth-side {
        flex: 1;
        background: linear-gradient(160deg, #4834d4, #6C63FF);
        color: #fff;
        padding: 48px 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .auth-side::before {
        content: "";
        position: absolute;
        width: 260px;
        height: 260px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 50%;
        top: -80px;
        right: -80px;
      }

      .auth-side::after {
        content: "";
        position: absolute;
        width: 180px;
        height: 180px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 50%;
        bottom: -60px;
        left: -60px;
      }

      .auth-side-icon {
        font-size: 2.6rem;
        margin-bottom: 18px;
      }

      .auth-side h2 {
        font-weight: 700;
        font-size: 1.6rem;
        margin-bottom: 12px;
      }

      .auth-side p {
        color: rgba(255, 255, 255, 0.85);
        font-size: 0.95rem;
        line-height: 1.6;
        margin: 0;
      }

      .auth-form-panel {
        flex: 1;
        padding: 44px 44px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .auth-brand {
        font-weight: 700;
        font-size: 1.4rem;
        color: #2d2d2d;
        margin-bottom: 6px;
      }

      .auth-sub {
        color: #8a8a8a;
        font-size: 0.9rem;
        margin-bottom: 24px;
      }

      .form-label {
        font-weight: 500;
        font-size: 0.88rem;
        color: #444;
      }

      .form-control {
        border-radius: 10px;
        padding: 10px 14px;
        border: 1.5px solid #e6e6f0;
        font-size: 0.95rem;
      }

      .form-control:focus {
        border-color: #6C63FF;
        box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
      }

      .btn-primary {
        width: 100%;
        background: #6C63FF;
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-weight: 600;
        font-size: 0.95rem;
        margin-top: 8px;
        transition: background 0.2s ease, transform 0.15s ease;
      }

      .btn-primary:hover {
        background: #574fd6;
        transform: translateY(-1px);
      }

      .switch-text {
        text-align: center;
        margin-top: 18px;
        font-size: 0.88rem;
        color: #6c757d;
      }

      .switch-text a {
        text-decoration: none;
        font-weight: 600;
        color: #6C63FF;
      }

      .switch-text a:hover {
        text-decoration: underline;
      }

      .alert {
        border-radius: 10px;
        font-size: 0.88rem;
      }

      .d-none { display: none; }

      @media (max-width: 767px) {
        .auth-side { display: none; }
        .auth-wrapper { min-height: auto; }
        .auth-form-panel { padding: 40px 28px; }
      }
    </style>
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-side d-none d-md-flex">
        <div class="auth-side-icon">🚀</div>
        <h2>Mulai Sekarang</h2>
        <p>Buat akun gratis dan mulai kelola keuanganmu dengan lebih terarah, mulai hari ini.</p>
      </div>

      <div class="auth-form-panel">
        <div class="auth-brand">Buat Akun Baru ✨</div>
        <div class="auth-sub">Isi data di bawah untuk mendaftar</div>

        <div id="regError" class="alert alert-danger py-2 d-none" role="alert"></div>
        <div id="regSuccess" class="alert alert-success py-2 d-none" role="alert"></div>

        <form id="formRegister">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="regEmail" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="regPassword" required minlength="6" />
          </div>
          <div class="mb-3">
            <label class="form-label">Konfirmasi Password</label>
            <input type="password" class="form-control" id="regPasswordConfirm" required minlength="6" />
          </div>
          <button type="submit" class="btn btn-primary">Daftar</button>
        </form>

        <div class="switch-text">
          Sudah punya akun?
          <a href="/">Masuk di sini</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-init.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
