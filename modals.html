<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/catatan.css">
</head>

<body>
    <div class="wrapper">
        <aside class="sidebar">
            <div class="brand">Catatan Keuangan</div>
            <nav>
                <a href="dashboard.html">Beranda</a>
                <a href="catatan.html" class="active">CatatanTransaksi</a>
                <a href="aktivitas.html">Aktivitas</a>
            </nav>
            <a href="index.html" class="logout">Logout</a>
        </aside>

        <main class="main">
            <div class="page-title">Catatan</div>

            <div class="form-section" id="form-pengeluaran">
                
                <div class="tab-wrapper">
                    <button class="tab-btn active" id="tab-pengeluaran-q" onclick="switchTab('pengeluaran')">
                        Pengeluaran
                    </button>
                    <button class="tab-btn" id="tab-pemasukan-q" onclick="switchTab('pemasukan')">
                        Pemasukan
                    </button>
                </div>

                <form action="" method="post">
                    <input type="hidden" name="tipe" value="pengeluaran">
                    
                    <div class="form-grup">
                        <label class="text-danger" for="deskripsi">deskripsi</label>
                        <input type="text" id="deskripsi" name="deskripsi" placeholder="Contoh : Beli Makanan...">
                    </div>
                    
                    <div class="form-grup">
                        <label class="text-danger" for="jumlah">Jumlah Pengeluaran</label>
                        <div class="input-prefix">
                            <span>Rp</span>
                            <input type="number" id="jumlah" name="jumlah" placeholder="0" min="0">
                        </div>
                    </div> 
                    
                    <button type="submit" class="btn-simpan">Simpan</button>
                </form>
            </div>

            <div class="form-section" id="form-pemasukan" style="display: none;">
                
                <div class="tab-wrapper">
                    <button class="tab-btn" id="tab-pengeluaran-m" onclick="switchTab('pengeluaran')">
                        Pengeluaran
                    </button>
                    <button class="tab-btn active active-masuk" id="tab-pemasukan-m" onclick="switchTab('pemasukan')">
                        Pemasukan
                    </button>
                </div>

                <form action="" method="post">
                    <input type="hidden" name="tipe" value="pemasukan">
                    
                    <div class="form-grup">
                        <label class="text-success" for="deskripsi_pemasukan">deskripsi</label>
                        <input type="text" id="deskismatch_pemasukan" name="deskripsi" placeholder="Contoh : Gajihan Masuk...">
                    </div>
                    
                    <div class="form-grup">
                        <label class="text-success" for="jumlah_pemasukan">Jumlah pemasukan</label>
                        <div class="input-prefix">
                            <span>Rp</span>
                            <input type="number" id="jumlah_pemasukan" name="jumlah" placeholder="0" min="0">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-simpan btn-masuk">Simpan</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        function switchTab(tipe) {
            document.querySelectorAll('.form-section').forEach(function (form) {
                form.style.display = 'none';
            });
            
            document.getElementById('form-' + tipe).style.display = 'block';
        }
    </script>
</body>

</html>
