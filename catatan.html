<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catatan Transaksi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/catatan.css" />
  </head>
  <body>

    <div class="wrapper">
      <nav class="navbar navbar-expand-md navbar-light bg-light d-block d-md-none px-3 shadow-sm">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">Catatan Keuangan</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
              <li class="nav-item"><a class="nav-link active" href="/catatan">Catatan Transaksi</a></li>
              <li class="nav-item"><a class="nav-link" href="/aktivitas">Aktivitas</a></li>
              <li class="nav-item"><a href="/" id="logoutM" style="text-decoration: none; color: red">Logout</a></li>
            </ul>
          </div>
        </div>
      </nav>

      <aside class="sidebar d-none d-md-flex">
        <div class="brand">Catatan Keuangan</div>
        <nav>
          <a href="/dashboard">Beranda</a>
          <a href="/catatan" class="active">Catatan Transaksi</a>
          <a href="/aktivitas">Aktivitas</a>
          <a href="/" id="logoutD" class="logout">Logout</a>
        </nav>
      </aside>

      <main class="main">
        <div class="row justify-content-end me-2 mb-3">
          <a class="page-title" style="text-decoration: none; cursor: pointer" onclick="window.print()">Print</a>
        </div>

        <div class="container-fluid m-0 p-0">
          <div class="table-container">
            <h3>Catatan Transaksi</h3>
            <div class="table-responsive">
              <table class="table table-bordered table-hover table-striped">
                <thead class="table-bg p-2">
                  <tr>
                    <th scope="col">No</th>
                    <th scope="col">Tanggal</th>
                    <th scope="col">Pemasukan</th>
                    <th scope="col">Pengeluaran</th>
                    <th scope="col">Keterangan</th>
                  </tr>
                </thead>
                <tbody id="tableBody">
                  <tr>
                    <td colspan="5" class="text-center py-5">
                      <div class="custom-spinner" style="margin: 0 auto"></div>
                      <div class="loading-text" style="margin-top: 10px">Memuat data...</div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-init.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/catatan.js"></script>
  </body>
</html>
