<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .error-code {
            font-size: 7rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(45deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -2px;
            animation: pulse 3s infinite ease-in-out;
        }

        h2 {
            font-size: 1.6rem;
            margin-bottom: 15px;
            color: #f1f5f9;
            font-weight: 600;
        }

        p {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* --- Tampilan Link Path/Breadcrumb Tersesat --- */
        .path-container {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-family: monospace;
            color: #cbd5e1;
            margin-bottom: 35px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .path-root {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        .path-root:hover {
            text-decoration: underline;
        }

        .path-current {
            color: #ef4444;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .separator {
            color: #64748b;
        }

        /* --- Tombol Kembali --- */
        .btn-home {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: #fff;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="error-code">404</div>
        <h2>File Not Found</h2>
        
        <p>The file "<strong id="failed-path" style="color: #ef4444; font-family: monospace;">...</strong>" cannot be found. It may have been moved, edited, or deleted.</p>
        
        <div class="path-container">
            <a href="/" class="path-root">beranda</a>
            <span class="separator">/</span>
            <span id="current-path" class="path-current">loading...</span>
        </div>

        <br>
        <a href="/" class="btn-home">Kembali ke Beranda</a>
    </div>

    <script>
        // 1. Ambil seluruh path dari URL browser
        const fullPath = window.location.pathname;
        
        // 2. Masukkan full path ke dalam teks deskripsi utama
        document.getElementById('failed-path').textContent = decodeURIComponent(fullPath);

        // 3. Pecah url untuk mengambil nama file/segmen terakhir saja untuk breadcrumb
        const segments = fullPath.split('/').filter(segment => segment !== "");
        const lastSegment = segments.length > 0 ? segments[segments.length - 1] : "halaman-hilang";
        
        // 4. Masukkan nama file ke link path bawah
        document.getElementById('current-path').textContent = decodeURIComponent(lastSegment);
    </script>

</body>
</html>
