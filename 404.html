<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tersesat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menggunakan CSS tambahan hanya untuk mempermudah animasi JS */
        .float { animation: floating 3s ease-in-out infinite; }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6 overflow-hidden">

    <!-- Efek Latar Belakang -->
    <div id="particles" class="absolute inset-0 z-0"></div>

    <div class="relative z-10 text-center max-w-lg w-full">
        <!-- Animasi Ikon -->
        <div id="icon-container" class="float text-9xl mb-6">🛸</div>
        
        <h1 class="text-6xl font-black mb-4 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
            404
        </h1>
        
        <p class="text-slate-400 text-lg mb-8">
            Wah, sepertinya Anda tersesat di luar angkasa. Halaman yang Anda cari tidak ditemukan!
        </p>

        <a href="/dashboard" class="group inline-flex items-center gap-2 bg-white text-slate-950 px-8 py-3 rounded-full font-bold hover:bg-cyan-400 transition-all duration-300">
            <span>Kembali ke Bumi</span>
            <span class="group-hover:translate-x-1 transition-transform">🚀</span>
        </a>
    </div>

    <script>
        // Animasi JS sederhana: Efek mouse follow pada ikon
        const icon = document.getElementById('icon-container');
        
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 20 - 10;
            const y = (e.clientY / window.innerHeight) * 20 - 10;
            icon.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Membuat elemen "bintang" dekoratif dengan JS
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.className = 'absolute bg-white rounded-full opacity-20';
            const size = Math.random() * 3 + 1 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            
            // Animasi kedip acak
            star.style.animation = `pulse ${Math.random() * 3 + 2}s infinite`;
            particlesContainer.appendChild(star);
        }
    </script>
</body>
</html>
